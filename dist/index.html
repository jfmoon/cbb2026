<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 NCAA Tournament — Style Classifier</title>
    <meta name="description" content="2026 NCAA Tournament team style classifier. 68 teams, 6 archetypes, scored from KenPom and EvanMiya data." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      /* Reset + base */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

        /* Light mode tokens — mirrors Claude.ai design system */
        --color-background-primary:   #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-info:      #eff6ff;
        --color-text-primary:         #1a1a18;
        --color-text-secondary:       #4b4b47;
        --color-text-tertiary:        #73726c;
        --color-text-info:            #1d4ed8;
        --color-border-tertiary:      rgba(0,0,0,0.12);
        --color-border-secondary:     rgba(0,0,0,0.20);
        --border-radius-md:           8px;
        --border-radius-lg:           12px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary:   #1c1c1a;
          --color-background-secondary: #252523;
          --color-background-info:      #1e2a40;
          --color-text-primary:         #e8e6df;
          --color-text-secondary:       #b0aea6;
          --color-text-tertiary:        #73726c;
          --color-text-info:            #93bbf8;
          --color-border-tertiary:      rgba(255,255,255,0.10);
          --color-border-secondary:     rgba(255,255,255,0.18);
        }
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 1rem 3rem;
      }

      /* Form elements — minimal default styling */
      input, select, button {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      select {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 5px 7px;
        cursor: pointer;
        outline-offset: 2px;
      }

      input[type="text"] {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 5px 9px;
        outline-offset: 2px;
      }

      input[type="text"]:focus,
      select:focus {
        outline: 2px solid var(--color-text-info);
      }

      button { cursor: pointer; }
    </style>
    <script type="module" crossorigin src="/assets/index-S_KaHLyU.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
